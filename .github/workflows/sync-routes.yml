# Weekly route-database sync from open climbing-data APIs (PLAN.md §5).
# Requires the DATABASE_URL repository secret (pooled Supabase URL is fine;
# DIRECT_URL optional for migrate deploy).
name: Sync routes

on:
  schedule:
    - cron: "17 3 * * 1" # Mondays 03:17 UTC — off the whole-hour stampede
  workflow_dispatch:
    inputs:
      max:
        description: "Max routes per source"
        default: "500"
        required: false
      shard:
        description: "Geofabrik shard key or rotate"
        default: "rotate"
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply pending migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      - name: Sync rotating Europe OSM shard
        continue-on-error: true
        run: npm run sync:routes -- --source=osm_geofabrik --shard=${{ github.event.inputs.shard || 'rotate' }} --max=${{ github.event.inputs.max || '500' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEOFABRIK_MAX_DOWNLOAD_MB: "4096"
      - name: Sync open catalogues and official overlays
        run: npm run sync:routes -- --source=openbeta,camptocamp,national_trails_england,national_trails_wales,england_coast_path,sweden_naturvardsverket --max=${{ github.event.inputs.max || '500' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NATURESCOT_TRAILS_GEOJSON_URL: ${{ secrets.NATURESCOT_TRAILS_GEOJSON_URL }}
